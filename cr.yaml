apiVersion: xxx.com/v1alpha1
kind: BookStore
metadata:
  name: example-bookstore
spec:
  # default values copied form <project_dir>/helm-charts/book-store/values.yaml

  # default values for book-store
  # this is a yaml formatted file
  # declare vars to be passed into your templates

  replicaCount: 1

  image:
    app:
      repository: akash125/pyapp
      tag: latest
      pullPolicy: IfNotPresent
    mongodb:
      repository: mongodb
      tag: latest
      pullPolicy: IfNotPresent

  service:
    app:
      type: LoadBalancer
      port: 80
      targetPort: 3000
    mongodb:
      type: ClusterIP
      port: 27017
      targetPort: 27017
  
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #  cpu: 100m
    #  memory: 128Mi
    # requests:
    #  cpu: 100m
    #  memory: 128Mi
  
  nodeSelector: {}

  tolerations: []

  affinity: {}
  
